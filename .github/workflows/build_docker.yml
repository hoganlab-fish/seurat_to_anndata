name: Build and Bundle

on:
  push:
    branches: [main, master]
    paths: ['Dockerfile', '**.sh', '**.Rmd', '**.py']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # STEP 1: Build the multi-arch image (Required for native Mac/Linux support)
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bundle-binaries:
    needs: build-image
    strategy:
      matrix:
        include:
          - os: ubuntu-latest  # Intel Linux
            target: dockerc_x86-64-gnu
            suffix: linux-x64
          - os: macos-latest   # Apple Silicon (ARM)
            target: dockerc_aarch64
            suffix: macos-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Docker
        uses: docker/setup-docker-action@v3
            
      - name: Download Architecture-Specific dockerc
        run: |
          wget "https://github.com/NilsIrl/dockerc/releases/download/v0.3.2/${{ matrix.target }}" -O dockerc
          chmod +x dockerc
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Binary
        run: |
          # Since we are running on the native OS, dockerc will 
          # automatically pull the correct image slice (ARM on Mac, Intel on Linux)
          ./dockerc \
            -i "docker://ghcr.io/hoganlab-fish/seurat_to_anndata:latest" \
            -o "s2a-${{ matrix.suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "s2a-binary-${{ matrix.suffix }}"
          path: "s2a-${{ matrix.suffix }}"