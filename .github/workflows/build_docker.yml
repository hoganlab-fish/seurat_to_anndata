name: Build and Bundle

on:
  push:
    branches: [main, master]
    paths: ['Dockerfile', '**.sh', '**.Rmd', '**.py']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # STEP 1: Build the multi-arch image (Required for native Mac/Linux support)
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # STEP 2: Create standalone binaries via dockerc
  bundle-binaries:
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: linux-x64
          - platform: linux/arm64
            suffix: macos-arm
    steps:
      - name: Download Linux x86_64 Compiler
        run: |
          # We ALWAYS download the x86-64-gnu version because it is the only 
          # one that can run on the GitHub Ubuntu runner.
          wget "https://github.com/NilsIrl/dockerc/releases/download/v0.3.2/dockerc_x86-64-gnu" -O dockerc
          chmod +x dockerc

      - name: Compile Binary
        run: |
          # Use the Linux compiler to bundle the specific platform slice.
          # For 'macos-arm', it pulls the 'linux/arm64' Docker layer.
          ./dockerc \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            -i "docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --platform "${{ matrix.platform }}" \
            -o "s2a-${{ matrix.suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          # Unique artifact name for the GitHub UI
          name: "s2a-binary-${{ matrix.suffix }}"
          # Path must match the '-o' filename from the Compile step
          path: "s2a-${{ matrix.suffix }}"